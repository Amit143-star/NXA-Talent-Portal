name: Manifest Industrial APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Industrial Binary Manifest
    runs-on: ubuntu-latest

    steps:
      - name: Synchronize Matrix
        uses: actions/checkout@v4

      - name: Setup Node Core
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Manifest Dependencies
        run: |
          npm install
          mkdir -p www
          cp index.html app.js style.css hero.png www/
          cp -r js css www/

      - name: Synchronize Android Platform
        run: |
          npx cap sync

      - name: Setup Java Runtime
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initiate Gradle Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Industrial APK
        uses: actions/upload-artifact@v4
        with:
          name: NXA_Talent_Portal_APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
