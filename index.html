<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXA Talent | Industrial Core</title>
    <link rel="stylesheet" href="style.css?v=4.4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- QR ENGINE & SCANNER UPLINK -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <!-- FIREBASE INDUSTRIAL BACKBONE (CLOUD SYNC) -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div id="root"></div>
    <div id="loading-mask" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.6s ease;">
        <div style="text-align: center;">
            <div style="font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 1rem;">
                <span style="color: #00e5ff;">NXA</span><span style="color: #fff; font-weight: 300; letter-spacing: 5px; margin-left: 5px;">TALENT</span>
            </div>
            <div style="width: 150px; height: 1px; background: rgba(0, 229, 255, 0.2); margin: 0 auto; position: relative; overflow: hidden;">
                <div style="position: absolute; width: 30%; height: 100%; background: #00e5ff; animation: bootFlow 1.5s infinite linear;"></div>
            </div>
            <p style="color: #64748b; font-size: 0.5rem; letter-spacing: 3px; margin-top: 1rem; font-family: sans-serif;">INIT_INDUSTRIAL_CORE</p>
        </div>
    </div>
    <style>
        @keyframes bootFlow {
            from { transform: translateX(-100%); }
            to { transform: translateX(330%); }
        }
    </style>
    <script src="app.js?v=4.4"></script>
</body>
</html>
